<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ナンパ師 Trophy System</title>
<meta property="og:title" content="ナンパ師 Trophy System">
<meta property="og:description" content="ストリートナンパの実績を解除してXでシェア！">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #080c14;
    --surface: #0e1520;
    --surface2: #162030;
    --border: rgba(255,255,255,0.06);
    --text: #e8ecf5;
    --muted: #5a6a88;
    --accent: #ff3c6e;
    --accent2: #ff7eb3;
    --glow: rgba(255,60,110,0.4);

    --bronze: #cd7f32;
    --silver: #b8c0cc;
    --gold: #ffd700;
    --platinum: #c8e6ff;

    --bronze-glow: rgba(205,127,50,0.5);
    --silver-glow: rgba(184,192,204,0.5);
    --gold-glow: rgba(255,215,0,0.5);
    --platinum-glow: rgba(200,230,255,0.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 50% 40% at 15% 15%, rgba(255,60,110,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 85% 85%, rgba(255,126,179,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 36px 16px 100px;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
  }

  .header-icon {
    width: 68px; height: 68px;
    background: linear-gradient(135deg, var(--accent), #cc2255);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    box-shadow: 0 0 36px var(--glow);
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 6vw, 52px);
    letter-spacing: 0.06em;
    line-height: 1;
    color: #fff;
  }

  .header-text p { color: var(--muted); font-size: 13px; margin-top: 5px; }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 16px var(--glow);
  }

  /* ===== STATS ===== */
  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
  }

  .stat-dot { width: 9px; height: 9px; border-radius: 50%; }
  .stat-dot.bronze  { background: var(--bronze);   box-shadow: 0 0 6px var(--bronze-glow); }
  .stat-dot.silver  { background: var(--silver);   box-shadow: 0 0 6px var(--silver-glow); }
  .stat-dot.gold    { background: var(--gold);     box-shadow: 0 0 6px var(--gold-glow); }
  .stat-dot.plat    { background: var(--platinum); box-shadow: 0 0 6px var(--platinum-glow); }

  /* ===== PROGRESS ===== */
  .progress-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    margin-bottom: 28px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .progress-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }

  .progress-bar-outer {
    height: 5px;
    background: var(--surface2);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 10px var(--glow);
  }

  /* ===== YAMANOTE SECTION ===== */
  .yamanote-section {
    background: var(--surface);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .yamanote-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 100% 0%, rgba(255,215,0,0.06), transparent 60%);
    pointer-events: none;
  }

  .yamanote-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .yamanote-badge {
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 8px;
    padding: 6px 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--gold);
  }

  .yamanote-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.06em;
  }

  .station-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }

  .station-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .station-chip:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }

  /* difficulty border colors */
  .station-chip.diff-bronze { border-color: rgba(205,127,50,0.25); }
  .station-chip.diff-silver { border-color: rgba(184,192,204,0.25); }
  .station-chip.diff-gold   { border-color: rgba(255,215,0,0.25); }

  .station-chip.done.diff-bronze { background: rgba(205,127,50,0.1);  border-color: rgba(205,127,50,0.5); }
  .station-chip.done.diff-silver { background: rgba(184,192,204,0.1); border-color: rgba(184,192,204,0.5); }
  .station-chip.done.diff-gold   { background: rgba(255,215,0,0.1);   border-color: rgba(255,215,0,0.5); }

  .station-chip.done.diff-bronze .station-name { color: var(--bronze); }
  .station-chip.done.diff-silver .station-name { color: var(--silver); }
  .station-chip.done.diff-gold   .station-name { color: var(--gold); }

  .station-icon { font-size: 18px; display: block; margin-bottom: 3px; }

  .station-name {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
    transition: color 0.2s;
  }

  .station-diff-badge {
    display: inline-block;
    font-size: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 1px 5px;
    border-radius: 4px;
    margin-top: 3px;
  }

  .diff-bronze .station-diff-badge { background: rgba(205,127,50,0.2);  color: var(--bronze); }
  .diff-silver .station-diff-badge { background: rgba(184,192,204,0.2); color: var(--silver); }
  .diff-gold   .station-diff-badge { background: rgba(255,215,0,0.2);   color: var(--gold); }

  .station-check {
    position: absolute;
    top: 5px; right: 5px;
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .station-chip.done .station-check { opacity: 1; }

  .yamanote-progress {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .yamanote-bar-outer {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 100px;
    overflow: hidden;
  }

  .yamanote-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #ffec80);
    border-radius: 100px;
    transition: width 0.6s ease;
    box-shadow: 0 0 8px var(--gold-glow);
  }

  .yamanote-count {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
  }

  /* ===== SECTION TITLE ===== */
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* ===== TROPHY GRID ===== */
  .trophy-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .trophy-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    cursor: pointer;
    transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .trophy-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.22s;
    border-radius: 14px;
  }

  .trophy-card.bronze::before  { background: radial-gradient(ellipse at 0 0, rgba(205,127,50,0.12), transparent 55%); }
  .trophy-card.silver::before  { background: radial-gradient(ellipse at 0 0, rgba(184,192,204,0.12), transparent 55%); }
  .trophy-card.gold::before    { background: radial-gradient(ellipse at 0 0, rgba(255,215,0,0.12), transparent 55%); }
  .trophy-card.platinum::before{ background: radial-gradient(ellipse at 0 0, rgba(200,230,255,0.14), transparent 55%); }

  .trophy-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.13); }
  .trophy-card:hover::before { opacity: 1; }
  .trophy-card.unlocked { border-color: rgba(255,255,255,0.1); }
  .trophy-card.locked   { opacity: 0.38; filter: grayscale(0.65); }

  .trophy-icon-wrap {
    flex-shrink: 0;
    width: 50px; height: 50px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    position: relative;
  }

  .trophy-card.bronze .trophy-icon-wrap   { background: rgba(205,127,50,0.14); box-shadow: 0 0 0 1px rgba(205,127,50,0.3); }
  .trophy-card.silver .trophy-icon-wrap   { background: rgba(184,192,204,0.14); box-shadow: 0 0 0 1px rgba(184,192,204,0.3); }
  .trophy-card.gold .trophy-icon-wrap     { background: rgba(255,215,0,0.14);   box-shadow: 0 0 0 1px rgba(255,215,0,0.35); }
  .trophy-card.platinum .trophy-icon-wrap { background: rgba(200,230,255,0.12); box-shadow: 0 0 0 1px rgba(200,230,255,0.35); }

  .trophy-card.unlocked.bronze .trophy-icon-wrap   { box-shadow: 0 0 18px var(--bronze-glow),   0 0 0 1px rgba(205,127,50,0.5); }
  .trophy-card.unlocked.silver .trophy-icon-wrap   { box-shadow: 0 0 18px var(--silver-glow),   0 0 0 1px rgba(184,192,204,0.5); }
  .trophy-card.unlocked.gold .trophy-icon-wrap     { box-shadow: 0 0 18px var(--gold-glow),     0 0 0 1px rgba(255,215,0,0.6); }
  .trophy-card.unlocked.platinum .trophy-icon-wrap { box-shadow: 0 0 28px var(--platinum-glow), 0 0 0 1px rgba(200,230,255,0.7); }

  .trophy-type-badge {
    position: absolute;
    bottom: -4px; right: -4px;
    width: 17px; height: 17px;
    border-radius: 50%;
    font-size: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    border: 2px solid var(--surface);
  }

  .bronze  .trophy-type-badge { background: var(--bronze);   color: #000; }
  .silver  .trophy-type-badge { background: var(--silver);   color: #000; }
  .gold    .trophy-type-badge { background: var(--gold);     color: #000; }
  .platinum.trophy-type-badge { background: var(--platinum); color: #000; }

  .trophy-info { flex: 1; min-width: 0; }

  .trophy-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .trophy-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  .trophy-time {
    font-size: 10px;
    color: var(--accent2);
    margin-top: 5px;
    font-family: 'Rajdhani', sans-serif;
    opacity: 0.8;
  }

  .trophy-lock-icon {
    position: absolute;
    top: 11px; right: 11px;
    font-size: 12px;
    opacity: 0.3;
  }

  /* ===== BUTTONS ===== */
  .bottom-actions { max-width: 420px; margin: 0 auto; }

  .unlock-btn {
    display: block; width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), #cc1144);
    border: none; border-radius: 12px;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 24px var(--glow);
    margin-bottom: 12px;
  }

  .unlock-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px var(--glow); }

  .share-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%;
    padding: 13px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
    text-decoration: none;
  }

  .share-btn:hover { background: var(--surface2); border-color: rgba(255,255,255,0.18); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(130px);
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 1000;
    transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
    min-width: 290px;
    max-width: 90vw;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .toast-icon  { font-size: 32px; flex-shrink: 0; }
  .toast-text strong { display: block; font-size: 15px; margin-bottom: 2px; }
  .toast-text small  { font-size: 11px; color: var(--muted); }

  .toast-type {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 700;
    margin-left: auto;
    flex-shrink: 0;
  }

  .toast.bronze-toast   { border-color: rgba(205,127,50,0.4); }
  .toast.silver-toast   { border-color: rgba(184,192,204,0.4); }
  .toast.gold-toast     { border-color: rgba(255,215,0,0.4); }
  .toast.platinum-toast { border-color: rgba(200,230,255,0.5); }

  .toast.bronze-toast   .toast-type { background: rgba(205,127,50,0.2);   color: var(--bronze); }
  .toast.silver-toast   .toast-type { background: rgba(184,192,204,0.2);  color: var(--silver); }
  .toast.gold-toast     .toast-type { background: rgba(255,215,0,0.2);    color: var(--gold); }
  .toast.platinum-toast .toast-type { background: rgba(200,230,255,0.2);  color: var(--platinum); }

  @keyframes unlockPulse {
    0%  { transform: scale(1); }
    35% { transform: scale(1.04); }
    65% { transform: scale(0.98); }
    100%{ transform: scale(1); }
  }

  .just-unlocked { animation: unlockPulse 0.7s ease; }

  .trophy-card.unlocked.platinum .trophy-icon-wrap {
    animation: platGlow 2.2s ease-in-out infinite alternate;
  }

  @keyframes platGlow {
    from { box-shadow: 0 0 18px var(--platinum-glow), 0 0 0 1px rgba(200,230,255,0.45); }
    to   { box-shadow: 0 0 44px rgba(200,230,255,0.9), 0 0 0 1px rgba(200,230,255,0.8); }
  }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    .trophy-grid { grid-template-columns: 1fr; }
    .station-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
  }
</style>

</head>
<body>

<div class="container">

  <!-- Header -->

  <div class="header">
    <div class="header-icon">💘</div>
    <div class="header-text">
      <h1>ナンパ師 TROPHY</h1>
      <p>ストリートナンパの実績を解除してXでシェアしよう</p>
    </div>
  </div>

  <!-- Tabs -->

  <div class="tabs">
    <div class="tab active" onclick="switchTab('all')">すべて</div>
    <div class="tab" onclick="switchTab('voice')">🗣️ 声かけ</div>
    <div class="tab" onclick="switchTab('contact')">📱 連絡先</div>
    <div class="tab" onclick="switchTab('date')">☕ デート</div>
    <div class="tab" onclick="switchTab('place')">📍 場所</div>
    <div class="tab" onclick="switchTab('yamanote')">🚃 山手線</div>
    <div class="tab" onclick="switchTab('legend')">👑 伝説</div>
  </div>

  <!-- Stats -->

  <div class="stats-bar">
    <div class="stat-chip"><div class="stat-dot plat"></div><span id="stat-plat">0</span> プラチナ</div>
    <div class="stat-chip"><div class="stat-dot gold"></div><span id="stat-gold">0</span> ゴールド</div>
    <div class="stat-chip"><div class="stat-dot silver"></div><span id="stat-silver">0</span> シルバー</div>
    <div class="stat-chip"><div class="stat-dot bronze"></div><span id="stat-bronze">0</span> ブロンズ</div>
  </div>

  <!-- Progress -->

  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-label">コンプリート率</span>
      <span class="progress-count" id="progress-text">0 / 0</span>
    </div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <!-- Yamanote Challenge -->

  <div class="yamanote-section" id="yamanote-section">
    <div class="yamanote-header">
      <span class="yamanote-badge">🚃 SPECIAL</span>
      <span class="yamanote-title">山手線一周ナンパ企画</span>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">29駅すべてでナンパを敢行！タップして完了をマーク</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
      <span style="font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:700;padding:3px 10px;border-radius:6px;background:rgba(255,215,0,0.12);color:var(--gold);border:1px solid rgba(255,215,0,0.3);">🥇 GOLD 激戦区</span>
      <span style="font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:700;padding:3px 10px;border-radius:6px;background:rgba(184,192,204,0.12);color:var(--silver);border:1px solid rgba(184,192,204,0.3);">🥈 SILVER 中級</span>
      <span style="font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:700;padding:3px 10px;border-radius:6px;background:rgba(205,127,50,0.12);color:var(--bronze);border:1px solid rgba(205,127,50,0.3);">🥉 BRONZE 穴場</span>
    </div>
    <div class="station-grid" id="station-grid"></div>
    <div class="yamanote-progress">
      <div class="yamanote-bar-outer">
        <div class="yamanote-bar-inner" id="yamanote-bar" style="width:0%"></div>
      </div>
      <div class="yamanote-count" id="yamanote-count">0 / 29駅</div>
    </div>
  </div>

  <!-- Trophy Grid -->

  <div class="section-title">トロフィーリスト</div>
  <div class="trophy-grid" id="trophy-grid"></div>

function fmt(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    const tabs = ['all','voice','contact','date','place','yamanote','legend'];
    el.classList.toggle('active', tabs[i] === tab);
  });

  const ym = document.getElementById('yamanote-section');
  ym.classList.toggle('hidden', tab !== 'all' && tab !== 'yamanote');

  renderTrophies();
}

          <div class="trophy-type-badge">${t.type[0].toUpperCase()}</div>
        </div>
        <div class="trophy-info">
          <div class="trophy-name">${t.name}</div>
          <div class="trophy-desc">${isUnlocked ? t.desc : '???'}</div>
          ${isUnlocked && trophyTimes[t.id] ? `<div class="trophy-time">🕐 ${fmt(trophyTimes[t.id])}</div>` : ''}
        </div>
        ${!isUnlocked ? '<div class="trophy-lock-icon">🔒</div>' : ''}
      </div>
    `;
  }).join('');
}

function renderStations() {
  const grid = document.getElementById('station-grid');
  const DIFF_LABEL = {bronze:'BRONZE', silver:'SILVER', gold:'GOLD'};
  grid.innerHTML = STATIONS.map(s => `
    <div class="station-chip diff-${s.diff} ${stationsDone.has(s.id) ? 'done' : ''}"
         onclick="toggleStation('${s.id}')"
         title="${s.reason}">
      <span class="station-icon">${s.icon}</span>
      <div class="station-name">${s.name}</div>
      <div class="station-diff-badge">${DIFF_LABEL[s.diff]}</div>
      <span class="station-check">✅</span>
    </div>
  `).join('');

  const pct = (stationsDone.size / STATIONS.length) * 100;
  document.getElementById('yamanote-bar').style.width = pct + '%';
  document.getElementById('yamanote-count').textContent = `${stationsDone.size} / ${STATIONS.length}駅`;
}

function checkMilestoneTrophies() {
  const count = stationsDone.size;
  const done = [...stationsDone];

  // デビュー（初駅）
  if(count >= 1 && !unlocked.has(36)) {
    unlocked.add(36); trophyTimes[36] = Date.now();
    setTimeout(()=>showToast(TROPHIES.find(t=>t.id===36)), 400);
  }
  // 渋谷・新宿ダブル
  if(done.includes('shibuya') && done.includes('shinjuku') && !unlocked.has(37)) {
    unlocked.add(37); trophyTimes[37] = Date.now();
    setTimeout(()=>showToast(TROPHIES.find(t=>t.id===37)), 800);
  }
  // 半周
  if(count >= 14 && !unlocked.has(38)) {
    unlocked.add(38); trophyTimes[38] = Date.now();
    setTimeout(()=>showToast(TROPHIES.find(t=>t.id===38)), 400);
  }
  // 一周完走
  if(count >= 29 && !unlocked.has(39)) {
    unlocked.add(39); trophyTimes[39] = Date.now();
    setTimeout(()=>showToast(TROPHIES.find(t=>t.id===39)), 1200);
  }
}

function toggleStation(id) {
  if(stationsDone.has(id)) {
    stationsDone.delete(id);
  } else {
    stationsDone.add(id);

    // 各駅トロフィー自動解除
    const stTrophy = TROPHIES.find(t => t.stationId === id);
    if(stTrophy && !unlocked.has(stTrophy.id)) {
      unlocked.add(stTrophy.id);
      trophyTimes[stTrophy.id] = Date.now();
      showToast(stTrophy);
    }

    // マイルストーン
    checkMilestoneTrophies();
  }
  save();
  renderStations();
  renderTrophies();
  renderStats();
}

function renderStats() {
  let counts = {bronze:0, silver:0, gold:0, platinum:0};
  unlocked.forEach(id => {
    const t = TROPHIES.find(x=>x.id===id);
    if(t) counts[t.type]++;
  });
  document.getElementById('stat-bronze').textContent = counts.bronze;
  document.getElementById('stat-silver').textContent = counts.silver;
  document.getElementById('stat-gold').textContent = counts.gold;
  document.getElementById('stat-plat').textContent = counts.platinum;

  const pct = Math.round((unlocked.size / TOTAL()) * 100);
  document.getElementById('progress-text').textContent = `${unlocked.size} / ${TOTAL()}`;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function render() {
  renderTrophies();
  renderStations();
  renderStats();
}

let toastTimer;
function showToast(trophy) {
  if(!trophy) return;
  const toast = document.getElementById('toast');
  toast.className = `toast ${trophy.type}-toast`;
  document.getElementById('toast-icon').textContent = trophy.icon;
  document.getElementById('toast-name').textContent = trophy.name;
  document.getElementById('toast-desc').textContent = trophy.desc;
  document.getElementById('toast-type').textContent = TYPE_LABELS[trophy.type];
  clearTimeout(toastTimer);
  toast.classList.remove('show');
  requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3800);
}

function toggleTrophy(id) {
  const t = TROPHIES.find(x=>x.id===id);
  if(unlocked.has(id)) {
    unlocked.delete(id);
    delete trophyTimes[id];
  } else {
    unlocked.add(id);
    trophyTimes[id] = Date.now();
    showToast(t);
    const card = document.getElementById(`card-${id}`);
    if(card) { card.classList.add('just-unlocked'); setTimeout(()=>card.classList.remove('just-unlocked'),700); }
  }
  save();
  render();
}

function unlockRandom() {
  const locked = TROPHIES.filter(t => !unlocked.has(t.id));
  if(!locked.length) { alert('🎉 すべての実績を解除しました！'); return; }
  const t = locked[Math.floor(Math.random()*locked.length)];
  unlocked.add(t.id);
  trophyTimes[t.id] = Date.now();
  save();
  render();
  showToast(t);
  const card = document.getElementById(`card-${t.id}`);
  if(card) { card.scrollIntoView({behavior:'smooth',block:'center'}); card.classList.add('just-unlocked'); setTimeout(()=>card.classList.remove('just-unlocked'),700); }
}

function shareToX() {
  let counts = {bronze:0,silver:0,gold:0,platinum:0};
  unlocked.forEach(id => { const t=TROPHIES.find(x=>x.id===id); if(t) counts[t.type]++; });
  const pct = Math.round((unlocked.size/TOTAL())*100);
  const sCount = stationsDone.size;

  // 難易度別駅クリア数
  const goldDone   = STATIONS.filter(s=>s.diff==='gold'   && stationsDone.has(s.id)).length;
  const silverDone = STATIONS.filter(s=>s.diff==='silver' && stationsDone.has(s.id)).length;
  const bronzeDone = STATIONS.filter(s=>s.diff==='bronze' && stationsDone.has(s.id)).length;

  let text = `💘 ナンパ師トロフィー ${unlocked.size}/${TOTAL()}個解除！\n`;
  text += `✨ プラチナ:${counts.platinum} 🥇ゴールド:${counts.gold} 🥈シルバー:${counts.silver} 🥉ブロンズ:${counts.bronze}\n`;
  if(sCount > 0) {
    text += `🚃 山手線一周企画: ${sCount}/29駅\n`;
    text += `  🥇激戦区:${goldDone} 🥈中級:${silverDone} 🥉穴場:${bronzeDone}\n`;
  }
  text += `📊 コンプリート率: ${pct}%\n\n#ナンパ師Trophy #山手線ナンパ #ストリートナンパ`;

  const url = window.location.href;
  window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,'_blank','width=600,height=500');
}

function resetAll() {
  if(confirm('本当にすべてリセットしますか？')) {
    unlocked.clear(); stationsDone.clear(); trophyTimes={};
    localStorage.removeItem('nanpa-trophies');
    localStorage.removeItem('nanpa-stations');
    localStorage.removeItem('nanpa-trophy-times');
    render();
  }
}

render();
</script>
